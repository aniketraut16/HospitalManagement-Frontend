<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Medication Management</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #f0f4f8;
            --card: #ffffff;
            --primary: #0a6e6e;
            --accent: #12b886;
            --text: #1a202c;
            --muted: #718096;
            --border: #e2e8f0;
            --shadow: 0 4px 24px rgba(0,0,0,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 48px 16px;
        }

        .container { width: 100%; max-width: 1000px; }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .header h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 2.2rem;
            color: var(--primary);
        }

        .btn-add {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 10px 18px;
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: var(--shadow);
        }

        .btn-add:hover { background: #085a5a; }

        /* Search */
        .search-wrapper {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .search-wrapper input {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid var(--border);
            border-radius: 10px;
            background: var(--card);
            outline: none;
            font-size: 0.95rem;
        }

        .search-wrapper button {
            padding: 12px 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .clear-btn {
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 10px;
            text-decoration: none;
            color: var(--muted);
        }

        .clear-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* Card */
        .card {
            background: var(--card);
            border-radius: 16px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: var(--primary);
            color: white;
        }

        thead th {
            padding: 16px;
            text-align: left;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        tbody tr {
            border-bottom: 1px solid var(--border);
        }

        tbody tr:hover {
            background: #f7fffe;
        }

        tbody td {
            padding: 14px 16px;
        }

        /* Buttons */
        .btn-edit {
            background: #ffc107;
            border: none;
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn-view {
            background: var(--accent);
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
        }

        .page-buttons a {
            margin: 0 3px;
            padding: 6px 12px;
            border-radius: 6px;
            text-decoration: none;
            border: 1px solid var(--border);
            color: var(--text);
        }

        .page-buttons a.active {
            background: var(--primary);
            color: white;
        }

    </style>
</head>

<body>

<div class="container">

    <!-- Header -->
    <div class="header">
        <h1>💊 Medication Management</h1>
        <button class="btn-add" onclick="window.location.href='/medications/add'">+ Add Medication</button>
    </div>

    <!-- Search -->
    <form th:action="@{/medications}" method="get" class="search-wrapper">

        <input type="text"
               name="keyword"
               th:value="${keyword}"
               placeholder="🔍 Search medications..." />

        <button type="submit">Search</button>

        <a th:href="@{/medications}" class="clear-btn">✕</a>

    </form>

    <!-- Table -->
    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Name</th>
                    <th>Brand</th>
                    <th>Description</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="m, iterStat : ${medications}">
                    <td th:text="${currentPage * size + iterStat.index + 1}"></td>
                    <td th:text="${m.name}"></td>
                    <td th:text="${m.brand}"></td>
                    <td th:text="${m.description}"></td>

                    <td>
                        <a th:href="@{'/medications/edit/' + ${m.code}}">
                            <button class="btn-edit">Edit</button>
                        </a>

                        <a th:href="@{/prescriptions(medicationId=${m.code})}"class="btn btn-view">
                           View
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>

        <!-- Pagination -->
        <div class="pagination">

            <span>
                Page <b th:text="${currentPage + 1}"></b> of 
                <b th:text="${totalPages}"></b>
            </span>

            <div class="page-buttons">

                <!-- Previous -->
                <a th:if="${currentPage > 0}"
                   th:href="@{/medications(page=${currentPage - 1}, keyword=${keyword})}">
                   Previous
                </a>

                <!-- Pages -->
                <span th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
                    <a th:href="@{/medications(page=${i}, keyword=${keyword})}"
                       th:text="${i + 1}"
                       th:classappend="${i == currentPage} ? 'active' : ''">
                    </a>
                </span>

                <!-- Next -->
                <a th:if="${currentPage < totalPages - 1}"
                   th:href="@{/medications(page=${currentPage + 1}, keyword=${keyword})}">
                   Next
                </a>

            </div>
        </div>

    </div>

</div>

</body>
</html>
