<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Medication Form</title>

    <!-- Tailwind -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        .font-serif-dm { font-family: 'DM Serif Display', serif; }
        body { font-family: 'DM Sans', sans-serif; background: #f0f4f8; color: #1a202c; }
    </style>
</head>

<body class="min-h-screen py-10 flex flex-col items-center justify-center px-4">

    <!-- 🔷 Breadcrumb -->
    <div class="w-full max-w-[600px] mb-4 flex items-center text-[0.95rem] font-medium text-[#718096]">
        <a href="/" class="hover:text-[#0a6e6e]">🏠 Home</a>
        <span class="mx-2 text-[#cbd5e0]">/</span>

        <a th:href="@{/medications}" class="hover:text-[#0a6e6e]">
            Medications
        </a>

        <span class="mx-2 text-[#cbd5e0]">/</span>

        <span class="text-[#1a202c]">
            <span th:text="${isEdit} ? 'Edit Medication' : 'Add Medication'"></span>
        </span>
    </div>

    <!-- 🔷 Card -->
    <div class="w-full max-w-[600px] bg-white rounded-2xl p-10 shadow">

        <!-- 🔷 Title -->
        <div class="mb-8 text-center">
            <h1 class="text-[2.2rem] text-[#0a6e6e] font-serif-dm">
                <span th:text="${isEdit} ? 'Edit Medication' : 'Add Medication'"></span>
            </h1>

            <p class="text-[#718096] text-[0.95rem] mt-1">
                Manage medication details
            </p>
        </div>

        <!-- 🔴 ERROR MESSAGE -->
        <div th:if="${errorMessage}" 
             class="bg-red-100 border border-red-300 text-red-700 p-3 rounded mb-4 text-sm">
            ⚠ <span th:text="${errorMessage}"></span>
        </div>

        <!-- 🔷 Form -->
        <form th:action="@{/medications/save}"
              th:object="${medication}"
              method="post"
              class="space-y-5">

            <!-- Code (ONLY ADD) -->
            <div th:if="${!isEdit}" class="flex flex-col gap-1.5">
                <label class="text-[0.95rem]">Code</label>
                <input type="number"
                       th:field="*{code}"
                       min="1"
                       max="1000000"
                       required
                       oninvalid="this.setCustomValidity('Code must be less than 1000000')"
                       oninput="this.setCustomValidity('')"
                       class="w-full px-4 py-3 border-2 border-[#e2e8f0] rounded-[10px] focus:border-[#0a6e6e] outline-none"/>
            </div>

            <!-- Hidden Code (EDIT) -->
            <input type="hidden" th:if="${isEdit}" th:field="*{code}" />

            <!-- Name -->
            <div class="flex flex-col gap-1.5">
                <label class="text-[0.95rem]">Medication Name</label>
                <input type="text"
                       th:field="*{name}"
                       pattern="^(?=.*[A-Za-z])[A-Za-z0-9 ]+$"
                       title="Must contain alphabets. Only letters and numbers allowed."
                       required
                       oninvalid="this.setCustomValidity('Invalid name. Use alphabets and numbers only.')"
                       oninput="this.setCustomValidity('')"
                       class="w-full px-4 py-3 border-2 border-[#e2e8f0] rounded-[10px] focus:border-[#0a6e6e] outline-none"/>
            </div>

            <!-- Brand -->
            <div class="flex flex-col gap-1.5">
                <label class="text-[0.95rem]">Brand</label>
                <input type="text"
                       th:field="*{brand}"
                       pattern="^(?=.*[A-Za-z])[A-Za-z0-9 ]+$"
                       title="Only alphabets and numbers allowed"
                       required
                       oninvalid="this.setCustomValidity('Invalid brand name')"
                       oninput="this.setCustomValidity('')"
                       class="w-full px-4 py-3 border-2 border-[#e2e8f0] rounded-[10px] focus:border-[#0a6e6e] outline-none"/>
            </div>

            <!-- Description -->
            <div class="flex flex-col gap-1.5">
                <label class="text-[0.95rem]">Description</label>
                <input type="text"
                       th:field="*{description}"
                       pattern="^(?=.*[A-Za-z])[A-Za-z0-9 .,()-]+$"
                       maxlength="200"
                       title="Only readable text allowed (no special junk like ###)"
                       required
                       oninvalid="this.setCustomValidity('Invalid description format')"
                       oninput="this.setCustomValidity('')"
                       class="w-full px-4 py-3 border-2 border-[#e2e8f0] rounded-[10px] focus:border-[#0a6e6e] outline-none"/>
            </div>

            <!-- 🔷 Submit -->
            <div class="pt-3">
                <button type="submit"
                        class="w-full bg-[#0a6e6e] hover:bg-[#085a5a] text-white py-3 rounded-[10px] shadow transition">
                    Save
                </button>
            </div>

        </form>

        <!-- 🔷 Back -->
        <div class="text-center mt-6">
            <a th:href="@{/medications}"
               class="inline-block px-5 py-2 border-2 border-[#e2e8f0] rounded-[10px] text-[#718096] hover:border-[#0a6e6e] hover:text-[#0a6e6e]">
                ← Back to Medications
            </a>
        </div>

    </div>

</body>
</html>
