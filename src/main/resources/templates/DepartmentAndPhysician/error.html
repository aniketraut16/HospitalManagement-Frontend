<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error — HMS</title>
    <!-- Tailwind Script & Basic Styles Since we're not including fragments here -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        teal: {
                            600: '#0d9488',
                            700: '#11706b',
                            800: '#115e59',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-600 font-sans min-h-screen selection:bg-teal-100 selection:text-teal-900 antialiased flex items-center justify-center p-6 relative">

    <div class="w-full max-w-lg bg-white border border-slate-200 shadow-lg rounded-2xl overflow-hidden relative z-10 text-center">
        
        <div class="h-32 bg-slate-50 flex justify-center items-end pb-8 border-b border-slate-200 relative">
            <div class="absolute inset-0 bg-[radial-gradient(circle_at_top,_var(--tw-gradient-stops))] from-red-500/10 to-transparent"></div>
            <div class="w-20 h-20 bg-white text-red-500 border border-slate-200 rounded-2xl flex items-center justify-center text-4xl shadow-md relative z-10 translate-y-12">
                <i class="fa-solid fa-triangle-exclamation"></i>
            </div>
        </div>

        <div class="px-8 pt-16 pb-8">
            <h1 class="text-3xl font-bold text-slate-800 mb-2 tracking-tight">System Error</h1>
            <p class="text-slate-500 mb-8" th:text="${message} ?: 'An unexpected error occurred while processing your request. Please try again.'">An error occurred.</p>
            
            <a th:href="@{/physicians}" class="inline-flex items-center justify-center gap-2 px-6 py-3 bg-teal-700 hover:bg-teal-800 text-white font-bold rounded-lg shadow-sm transition-all active:scale-95 w-full sm:w-auto">
                <i class="fa-solid fa-arrow-left"></i>
                Return to Dashboard
            </a>
            
            <p class="text-xs text-slate-400 mt-6 font-mono flex items-center justify-center gap-2">
                <i class="fa-solid fa-terminal"></i>
                Error Status: <span th:text="${status} ?: 'Unknown'" class="font-bold text-slate-600">500</span>
            </p>
        </div>
        
    </div>

</body>
</html>
