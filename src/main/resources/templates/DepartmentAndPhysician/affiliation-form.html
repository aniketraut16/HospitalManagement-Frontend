<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{DepartmentAndPhysician/fragments :: head('Assign Affiliation')}"></head>
<body class="bg-slate-50 text-slate-600 font-sans min-h-screen selection:bg-teal-100 selection:text-teal-900 antialiased">
<div class="flex h-screen overflow-hidden">

    <main class="flex-1 overflow-y-auto relative p-8 lg:p-12 flex items-center justify-center">
        
        <div class="w-full max-w-2xl relative">

            <!-- Back link -->
            <div class="mb-6 relative z-10">
                <a th:href="@{/affiliations}" class="inline-flex items-center gap-2 text-sm font-medium text-slate-500 hover:text-teal-700 transition-colors">
                    <i class="fa-solid fa-arrow-left"></i> Back to Mapping
                </a>
            </div>

            <!-- Form Card -->
            <div class="glass-card overflow-hidden relative z-10 shadow-lg">
                
                <div class="px-8 py-6 border-b border-slate-100 bg-teal-700 text-white">
                    <h2 class="text-2xl font-bold tracking-tight flex items-center gap-3">
                        <i class="fa-solid fa-link text-teal-100"></i>
                        <span>Assign Physician to Department</span>
                    </h2>
                    <p class="text-teal-100 text-sm mt-1">Please select the physician and map them to their corresponding department.</p>
                </div>

                <div class="p-8 bg-white">
                    <!-- Form Errors (Global) -->
                    <div th:if="${error}" class="mb-6 animate-fade-in-down">
                        <div class="flex items-start gap-3 px-4 py-3 bg-red-50 text-red-700 border border-red-200 rounded-lg shadow-sm text-sm">
                            <i class="fa-solid fa-circle-exclamation mt-0.5"></i>
                            <span th:text="${error}"></span>
                        </div>
                    </div>

                    <form th:action="@{/affiliations/new}" method="post" class="space-y-6">

                        <!-- External Doctor selection -->
                        <div>
                            <label for="physicianId" class="block text-sm font-bold text-slate-700 mb-2">Physician</label>
                            <div class="relative">
                                <span class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-slate-400">
                                    <i class="fa-solid fa-user-doctor"></i>
                                </span>
                                <select id="physicianId" name="physicianId" required
                                       class="input-field !pl-12 appearance-none">
                                    <option value="" disabled selected>-- Select a Physician --</option>
                                    <option th:each="p : ${physicians}"
                                            th:value="${p.employeeId}"
                                            th:text="${p.name + ' (' + p.position + ')'}">
                                    </option>
                                </select>
                                <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none text-slate-400">
                                    <i class="fa-solid fa-caret-down text-sm"></i>
                                </div>
                            </div>
                        </div>

                        <!-- Department Selection -->
                        <div>
                            <label for="departmentId" class="block text-sm font-bold text-slate-700 mb-2">Assign to Department</label>
                            <div class="relative">
                                <span class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-slate-400">
                                    <i class="fa-solid fa-building"></i>
                                </span>
                                <select id="departmentId" name="departmentId" required
                                       class="input-field !pl-12 appearance-none">
                                    <option value="" disabled selected>-- Select a Department --</option>
                                    <option th:each="d : ${departments}"
                                            th:value="${d.departmentId}"
                                            th:text="${d.name + ' (Head: ' + d.headName + ')'}">
                                    </option>
                                </select>
                                <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none text-slate-400">
                                    <i class="fa-solid fa-caret-down text-sm"></i>
                                </div>
                            </div>
                        </div>

                        <div class="flex items-center gap-3 p-4 border border-teal-100 bg-teal-50 rounded-lg">
                            <input type="checkbox" id="isPrimary" name="isPrimary" value="true" class="w-4 h-4 text-teal-600 bg-white border-slate-300 rounded focus:ring-teal-500">
                            <input type="hidden" name="isPrimary" value="false" />
                            <label for="isPrimary" class="ml-2 text-sm font-semibold text-teal-800">
                                Primary Affiliation <br/><span class="font-normal text-xs text-teal-600">Check this if the selected department is the main affiliation for the physician.</span>
                            </label>
                        </div>

                        <!-- Actions -->
                        <div class="pt-6 border-t border-slate-100 flex items-center justify-end gap-3">
                            <a th:href="@{/affiliations}" class="btn-secondary">
                                Cancel
                            </a>
                            <button type="submit" class="btn-primary">
                                <i class="fa-solid fa-link"></i>
                                <span>Assign Affiliation</span>
                            </button>
                        </div>

                    </form>
                </div>
            </div>
            
        </div>
    </main>
</div>
</body>
</html>
