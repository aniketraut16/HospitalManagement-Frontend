<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Nurse</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f0f4f8;
            --card: #ffffff;
            --primary: #0a6e6e;
            --primary-dark: #085a5a;
            --text: #1a202c;
            --muted: #718096;
            --border: #e2e8f0;
            --border-focus: #0a6e6e;
            --error: #e53e3e;
            --error-bg: #fff5f5;
            --error-border: #feb2b2;
            --shadow: 0 4px 24px rgba(0,0,0,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 48px 16px;
        }

        .container { width: 100%; max-width: 580px; }

        /* BREADCRUMB */
        .breadcrumb {
            width: 100%;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--muted);
        }
        .breadcrumb a {
            color: var(--muted);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }
        .breadcrumb a:hover { color: var(--primary); }
        .breadcrumb .sep { margin: 0 8px; color: #cbd5e0; }
        .breadcrumb .current { color: var(--text); text-shadow: 0 1px 2px rgba(0,0,0,0.05); }

        /* CARD */
        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 40px 44px;
            box-shadow: var(--shadow);
        }

        .card-header { text-align: center; margin-bottom: 32px; }
        .card-header h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 2rem;
            color: var(--primary);
            letter-spacing: -0.5px;
        }
        .card-header p { color: var(--muted); margin-top: 6px; font-size: 0.92rem; font-weight: 300; }

        /* FORM */
        .form-group { margin-bottom: 20px; }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 7px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 11px 16px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            color: var(--text);
            background: var(--card);
            outline: none;
            transition: border-color 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .form-group input:focus,
        .form-group select:focus { border-color: var(--border-focus); }
        .form-group select { cursor: pointer; }

        .form-group input.has-error,
        .form-group select.has-error {
            border-color: var(--error);
            background: var(--error-bg);
        }

        .error-msg {
            display: block;
            margin-top: 5px;
            font-size: 0.82rem;
            color: var(--error);
            font-weight: 500;
        }

        .hint {
            display: block;
            margin-top: 4px;
            font-size: 0.8rem;
            color: var(--muted);
        }

        /* Suppress number input arrows */
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; appearance: textfield; }

        /* ACTIONS */
        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }

        .btn-submit {
            flex: 1;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-submit:hover { background: var(--primary-dark); }

        .btn-cancel {
            flex: 1;
            padding: 12px;
            background: var(--card);
            color: var(--muted);
            border: 2px solid var(--border);
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            text-decoration: none;
            text-align: center;
            transition: border-color 0.2s, color 0.2s;
        }
        .btn-cancel:hover { border-color: var(--primary); color: var(--primary); }
    </style>
</head>

<body>
<div class="container">

    <!-- BREADCRUMB -->
    <div class="breadcrumb">
        <a href="/">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
            </svg>
            Home
        </a>
        <span class="sep">/</span>
        <a href="/nurses">Nurses</a>
        <span class="sep">/</span>
        <span class="current">Add Nurse</span>
    </div>

    <!-- CARD -->
    <div class="card">

        <div class="card-header">
            <h1>Add Nurse</h1>
            <p>Fill out the details to register a new nurse</p>
        </div>

        <form th:action="@{/nurses/add}" method="post" th:object="${nurse}" novalidate id="addNurseForm">

            <!-- Employee ID -->
            <div class="form-group">
                <label for="employeeId">Employee ID</label>
                <input type="number"
                       id="employeeId"
                       th:field="*{employeeId}"
                       th:classappend="${#fields.hasErrors('employeeId')} ? ' has-error'"
                       placeholder="e.g. 1001"
                       min="1" max="99999"
                       onkeydown="return event.key !== 'e' && event.key !== 'E' && event.key !== '+' && event.key !== '-' && event.key !== '.'" />
                <span class="hint">Positive number between 1 and 99999</span>
                <span class="error-msg" th:if="${#fields.hasErrors('employeeId')}" th:errors="*{employeeId}"></span>
            </div>

            <!-- Name -->
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text"
                       id="name"
                       th:field="*{name}"
                       th:classappend="${#fields.hasErrors('name')} ? ' has-error'"
                       placeholder="e.g. Anita Sharma"
                       maxlength="100" />
                <span class="hint">Letters, spaces, dots, hyphens and apostrophes only (2–100 chars)</span>
                <span class="error-msg" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
            </div>

            <!-- Position -->
            <div class="form-group">
                <label for="position">Position</label>
                <select id="position"
                        th:field="*{position}"
                        th:classappend="${#fields.hasErrors('position')} ? ' has-error'">
                    <option value="">-- Select Position --</option>
                    <option th:each="pos : ${positions}"
                            th:value="${pos.name()}"
                            th:text="${pos.displayName}">
                    </option>
                </select>
                <span class="error-msg" th:if="${#fields.hasErrors('position')}" th:errors="*{position}"></span>
            </div>

            <!-- Registered -->
            <div class="form-group">
                <label for="registered">Registered</label>
                <select id="registered" th:field="*{registered}">
                    <option value="true">Yes</option>
                    <option value="false">No</option>
                </select>
            </div>

            <!-- SSN -->
            <div class="form-group">
                <label for="ssn">SSN</label>
                <input type="number"
                       id="ssn"
                       th:field="*{ssn}"
                       th:classappend="${#fields.hasErrors('ssn')} ? ' has-error'"
                       placeholder="e.g. 123456789"
                       min="1" max="999999999"
                       onkeydown="return event.key !== 'e' && event.key !== 'E' && event.key !== '+' && event.key !== '-' && event.key !== '.'" />
                <span class="hint">Positive number up to 999999999</span>
                <span class="error-msg" th:if="${#fields.hasErrors('ssn')}" th:errors="*{ssn}"></span>
            </div>

            <div class="form-actions">
                <a href="/nurses" class="btn-cancel">Cancel</a>
                <button type="submit" class="btn-submit">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
                    </svg>
                    Save Nurse
                </button>
            </div>

        </form>
    </div>
</div>

<script>
    document.getElementById('addNurseForm').addEventListener('submit', function(e) {
        clearClientErrors();
        let valid = true;

        const employeeId = document.getElementById('employeeId');
        const name = document.getElementById('name');
        const position = document.getElementById('position');
        const ssn = document.getElementById('ssn');

        const idVal = parseInt(employeeId.value);
        if (!employeeId.value || isNaN(idVal) || idVal < 1 || idVal > 99999) {
            markError(employeeId, 'Employee ID must be a number between 1 and 99999');
            valid = false;
        }

        const nameVal = name.value.trim();
        if (!nameVal || nameVal.length < 2 || nameVal.length > 100) {
            markError(name, 'Name must be between 2 and 100 characters');
            valid = false;
        } else if (!/^[a-zA-Z\s.\-']+$/.test(nameVal)) {
            markError(name, 'Name can only contain letters, spaces, dots, hyphens and apostrophes');
            valid = false;
        }

        if (!position.value) {
            markError(position, 'Please select a position');
            valid = false;
        }

        const ssnVal = parseInt(ssn.value);
        if (!ssn.value || isNaN(ssnVal) || ssnVal < 1 || ssnVal > 999999999) {
            markError(ssn, 'SSN must be a positive number up to 999999999');
            valid = false;
        }

        if (!valid) e.preventDefault();
    });

    function markError(field, message) {
        field.classList.add('has-error');
        const existing = field.parentElement.querySelector('.client-error');
        if (!existing) {
            const span = document.createElement('span');
            span.className = 'error-msg client-error';
            span.textContent = message;
            field.parentElement.appendChild(span);
        }
    }

    function clearClientErrors() {
        document.querySelectorAll('.client-error').forEach(el => el.remove());
        document.querySelectorAll('.has-error').forEach(el => el.classList.remove('has-error'));
    }
</script>

</body>
</html>
